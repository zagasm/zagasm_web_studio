name: Deploy production frontend to Bunny on release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    env:
      BUILD_DIR: dist

      BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
      BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
      BUNNY_STORAGE_REGION: ${{ secrets.BUNNY_STORAGE_REGION }}
      BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
      BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
      BUNNY_SPA_FALLBACK_PATH: ${{ secrets.BUNNY_SPA_FALLBACK_PATH }}

      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Show release info
        run: |
          echo "Tag: ${{ github.event.release.tag_name || github.ref_name }}"
          echo "Event: ${{ github.event_name }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build directory '$BUILD_DIR' not found."
            exit 1
          fi

          if [ ! -f "$BUILD_DIR/index.html" ]; then
            echo "index.html not found inside '$BUILD_DIR'."
            exit 1
          fi

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve Bunny storage zone ID
        id: zone
        shell: bash
        run: |
          set -euo pipefail

          ZONE_ID="$(
            curl --fail --silent --show-error \
              --request GET \
              --url "https://api.bunny.net/storagezone" \
              --header "AccessKey: ${BUNNY_API_KEY}" \
            | jq -r --arg ZONE_NAME "$BUNNY_STORAGE_ZONE" '
                if type == "array" then
                  (.[] | select(.Name == $ZONE_NAME) | .Id) // empty
                else
                  (.Items[] | select(.Name == $ZONE_NAME) | .Id) // empty
                end
              ' \
            | head -n 1
          )"

          if [ -z "${ZONE_ID:-}" ] || [ "$ZONE_ID" = "null" ]; then
            echo "Could not resolve Bunny storage zone ID for zone: $BUNNY_STORAGE_ZONE"
            exit 1
          fi

          echo "Resolved storage zone ID: $ZONE_ID"
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"

      - name: Configure Bunny SPA fallback
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.bunny.net/storagezone/${{ steps.zone.outputs.zone_id }}" \
            --header "AccessKey: ${BUNNY_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @- <<EOF
          {
            "Custom404FilePath": "${BUNNY_SPA_FALLBACK_PATH}",
            "Rewrite404To200": true
          }
          EOF

          echo "Bunny SPA fallback configured."

      - name: Remove old files from Bunny Storage root
        shell: bash
        run: |
          set -euo pipefail

          STORAGE_HOST="${BUNNY_STORAGE_REGION}.storage.bunnycdn.com"

          echo "$EXISTING_ITEMS" | jq -c '.[]' | while read -r item; do
          OBJECT_NAME="$(echo "$item" | jq -r '.ObjectName')"
          IS_DIR="$(echo "$item" | jq -r '.IsDirectory')"

          if [ -z "$OBJECT_NAME" ] || [ "$OBJECT_NAME" = "null" ]; then
            continue
          fi

          # Skip directories (fixes your error)
          if [ "$IS_DIR" = "true" ]; then
            echo "Skipping directory: $OBJECT_NAME"
            continue
          fi

          echo "Deleting file: $OBJECT_NAME"

          curl --fail --silent --show-error \
            --request DELETE \
            --url "https://${STORAGE_HOST}/${BUNNY_STORAGE_ZONE}/${OBJECT_NAME}" \
            --header "AccessKey: ${BUNNY_STORAGE_PASSWORD}"
          done

      - name: Upload build files to Bunny Storage
        shell: bash
        run: |
          set -euo pipefail

          STORAGE_HOST="${BUNNY_STORAGE_REGION}.storage.bunnycdn.com"

          echo "Uploading files from $BUILD_DIR to https://$STORAGE_HOST/$BUNNY_STORAGE_ZONE/"

          find "$BUILD_DIR" -type f | while read -r file; do
            rel_path="${file#"$BUILD_DIR"/}"
            content_type="$(file --brief --mime-type "$file")"

            echo "Uploading: $rel_path"
            curl --fail --silent --show-error \
              --request PUT \
              --url "https://${STORAGE_HOST}/${BUNNY_STORAGE_ZONE}/${rel_path}" \
              --header "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              --header "Content-Type: ${content_type}" \
              --upload-file "$file"
          done

      - name: Purge Bunny CDN cache
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
            --header "AccessKey: ${BUNNY_API_KEY}" \
            --header "Content-Type: application/json" \
            --data '{}'

          echo "Bunny CDN cache purged."

      - name: Deployment complete
        run: echo "Production deployment complete."